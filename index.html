<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <h2>Lista de Compras</h2>

        <div class="input-area">

            <input type="text" id="nome" placeholder="Produto">
            <input type="number" id="quantidade" placeholder="Qtd" min="1">

            <button class="btn-adicionar" onclick="adicionarItem()">
                Adicionar
            </button>

            <div id="erro" class="erro"></div>

        </div>

        <ul id="lista"></ul>

        <div class="numero-pagina" id="numeroPagina">1</div>

    </div>

    <!-- Folha dobrada com seta -->
    <div class="virar-pagina" onclick="proximaPagina()">
        <i class="fa-solid fa-arrow-right"></i>
    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
