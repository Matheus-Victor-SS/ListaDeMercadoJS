<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">
<center>
    <h2> Lista de Compras</h2></center>

    <div class="input-area">
        <input type="text" id="nome" placeholder="Produto">
        <input type="number" id="quantidade" placeholder="Qtd" min="1">
        <button class="btn-adicionar" onclick="adicionarItem()">Adicionar</button>
        <div id="erro" class="erro"></div>
    </div>

    <ul id="lista"></ul>

    <div class="numero-pagina" id="numeroPagina">1</div>

    <div class="navegacao-paginas">
        <div class="voltar-pagina" id="btnVoltar" onclick="paginaAnterior()">
            <i class="fa-solid fa-circle-arrow-left"></i>
        </div>
        <div class="virar-pagina" id="btnAvancar" onclick="proximaPagina()">
            <i class="fa-solid fa-circle-arrow-right"></i>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
